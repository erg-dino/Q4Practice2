<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
    <h1>Switch statement</h1>

    <button class="btn btn-info" onclick="Rank()">Rank</button>
    <script>
        function Rank(){ //use this part for drill 2
             var rank = "1st";

             var message = "";

             switch (true){
                case (rank === "1st"):
                    message = "Congratulations! You are the champion!";
                    break;
                case (rank === "2nd"):
                    message = "Second place is still an achievement! Keep it up!";
                    break;
                case (rank === "3rd"):
                    message = "Third place is an achievement! Keep it up!";
                    break;
                case (rank === "4th"):
                    message = "YOU SUCK!!!";
                    break;
                default:
                    message = "No rank.";
                }
                alert(message);
        }


        let team = "Green"; //string

        switch (team){
            case "Green":
                alert("Go Green Hornets! Champs!");
                break;
            case "Blue":team
                alert("Go Blue Bears! For the loss!");
                break;
            case "Red":
                alert("Go Red Bulldogs! ok lang yan!");
                break;
            case "Yellow":
                alert("Go Yellow Tigers! Rawr!");
                break;
            default:
                alert("No team 💀");
        }
    </script>
</body>
</html>
